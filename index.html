<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dinosaur Time Rescue: Red Light, Green Light!</title>
    <style>
        body {
            background-color: #222; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center; margin-top: 10px;
        }
        canvas {
            background-color: #8B5A2B; border: 8px solid #2E8B57;
            box-shadow: 0px 0px 15px #000; margin-bottom: 10px;
        }
        .controls { margin: 15px; }
        button {
            padding: 10px 20px; font-size: 16px; font-family: 'Courier New', Courier, monospace;
            cursor: pointer; background-color: #4CAF50; color: white;
            border: none; border-radius: 5px; margin: 5px;
        }
        button:hover { background-color: #45a049; }
        .reset-btn { background-color: #FF8C00; }
        .reset-btn:hover { background-color: #E67E22; }
        #backpack { color: #FFD700; font-weight: bold; }
        #meat-count { color: #FFB6C1; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Dinosaur Time Rescue!</h1>
    
    <div class="controls" id="character-select">
        <h3>Choose your hero:</h3>
        <button onclick="startGame('Lila')">Play as Lila (Purple)</button>
        <button onclick="startGame('Nate')">Play as Nate (Blue)</button>
    </div>

    <div id="game-ui" style="display: none;">
        <p>Hero: <span id="hero-name"></span> | Backpack: <span id="backpack">Empty</span> | Meat: <span id="meat-count">0</span></p>
        <p>Use <strong>Arrow Keys</strong>. Step on Light Green Vines to SWING fast!</p>
        <p><strong>Press SPACEBAR to drop Dino-Meat and distract Raptors!</strong></p>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <br>
        <button class="reset-btn" onclick="resetBoard()">Generate New Maze</button>
        <button id="pause-btn" onclick="togglePause()">Pause Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 30; 
        
        let player = { x: 1, y: 1, color: 'purple' }; 
        let inventorsRescued = 0;
        let gameState = 'start'; 
        let isPaused = false;
        let tick = 0;
        let gameInterval;
        
        const inventorNames = new Array("Ryan", "Lyon", "Rihanna", "Leia", "Eloise");
        let backpack = new Array();
        let maze = new Array();
        let enemies = new Array();
        let meatInventory = 0;
        let activeMeats = new Array(); 

        // Boss Battle Variables
        let bossState = 'sleeping';
        let bossTimer = 0;
        let bossSleepDuration = 12; // Base duration
        let bossAwakeDuration = 8;  // Base duration

        function generateMap() {
            maze = new Array();
            
            for(let r = 0; r < 20; r++) {
                let row = new Array();
                for(let c = 0; c < 20; c++) {
                    row.push(1);
                }
                maze.push(row);
            }
            
            let openTiles = new Array();
            openTiles.push({x: 1, y: 1});
            maze.at(1).splice(1, 1, 0); 
            
            let dirs = new Array(
                {x: 0, y: -1}, {x: 0, y: 1}, {x: -1, y: 0}, {x: 1, y: 0}
            );
            
            let targetOpen = 220; 
            let attempts = 0;
            
            while(openTiles.length < targetOpen && attempts < 5000) {
                attempts++;
                
                let randIndex = Math.floor(Math.random() * openTiles.length);
                if (Math.random() < 0.75) {
                    randIndex = openTiles.length - 1; 
                }
                
                let startTile = openTiles.at(randIndex);
                let randDirIndex = Math.floor(Math.random() * dirs.length);
                let dir = dirs.at(randDirIndex);
                
                let nx = startTile.x + dir.x;
                let ny = startTile.y + dir.y;
                
                if(nx >= 0 && nx <= 19 && ny >= 0 && ny <= 19) {
                    if(maze.at(ny).at(nx) === 1) {
                        maze.at(ny).splice(nx, 1, 0);
                        openTiles.push({x: nx, y: ny});
                    }
                }
            }

            let safeSpawns = new Array();
            for(let i = 0; i < openTiles.length; i++) {
                let t = openTiles.at(i);
                if(t.x > 5 || t.y > 5) {
                    safeSpawns.push(t);
                }
            }
            safeSpawns.sort(() => Math.random() - 0.5);

            for(let i = 0; i < 5; i++) {
                let t = safeSpawns.pop();
                maze.at(t.y).splice(t.x, 1, 3); 
            }
            for(let i = 0; i < 8; i++) {
                let t = safeSpawns.pop();
                maze.at(t.y).splice(t.x, 1, 4); 
            }
            for(let i = 0; i < 15; i++) {
                let t = safeSpawns.pop();
                maze.at(t.y).splice(t.x, 1, 2); 
            }
            for(let i = 0; i < 5; i++) {
                let t = safeSpawns.pop();
                maze.at(t.y).splice(t.x, 1, 5); 
            }

            enemies = new Array();
            for(let i = 0; i < 3; i++) {
                let t = safeSpawns.pop();
                enemies.push({ type: 'Raptor', x: t.x, y: t.y, dirX: 1, dirY: 0, color: '#FF0000' });
            }
            for(let i = 0; i < 3; i++) {
                let t = safeSpawns.pop();
                enemies.push({ type: 'Stegosaurus', x: t.x, y: t.y, dirX: 0, dirY: 1, color: '#808080' });
            }
        }

        function togglePause() {
            if (gameState === 'start' || gameState === 'win') return;
            isPaused = !isPaused;
            
            let btn = document.getElementById('pause-btn');
            if (isPaused) {
                btn.innerText = 'Resume Game';
                btn.style.backgroundColor = '#d9534f'; 
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 50px Courier New';
                ctx.fillText('PAUSED', 210, 310);
            } else {
                btn.innerText = 'Pause Game';
                btn.style.backgroundColor = '#4CAF50'; 
                drawGame(); 
            }
        }

        function startGame(character) {
            document.getElementById('character-select').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('hero-name').innerText = character;
            player.color = character === 'Lila' ? '#9C27B0' : '#2196F3';
            resetBoard();
            
            if (!gameInterval) {
                gameInterval = setInterval(updateEngine, 250);
            }
        }

        function resetBoard() {
            gameState = 'maze';
            isPaused = false;
            let pBtn = document.getElementById('pause-btn');
            pBtn.innerText = 'Pause Game';
            pBtn.style.backgroundColor = '#4CAF50';
            
            player.x = 1;
            player.y = 1;
            inventorsRescued = 0;
            backpack = new Array();
            document.getElementById('backpack').innerText = 'Empty';
            meatInventory = 0;
            document.getElementById('meat-count').innerText = '0';
            activeMeats = new Array();
            
            generateMap();
            drawGame();
        }

        function drawGame() {
            if (isPaused) return; 
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameState === 'maze') {
                for (let row = 0; row < 20; row++) {
                    for (let col = 0; col < 20; col++) {
                        let tile = maze.at(row).at(col);
                        if (tile === 1) { 
                            ctx.fillStyle = '#006400'; 
                            ctx.fillRect(col * tileSize, row * tileSize, tileSize, tileSize); 
                        } else if (tile === 2) { 
                            ctx.fillStyle = '#32CD32'; 
                            ctx.fillRect(col * tileSize, row * tileSize, tileSize, tileSize); 
                        } else if (tile === 3) { 
                            ctx.fillStyle = '#FFD700'; 
                            ctx.fillRect(col * tileSize + 5, row * tileSize + 5, 20, 20); 
                        } else if (tile === 4) { 
                            ctx.fillStyle = '#FF4500'; 
                            ctx.fillRect(col * tileSize, row * tileSize, tileSize, tileSize); 
                        } else if (tile === 5) {
                            ctx.fillStyle = '#FFB6C1'; 
                            ctx.fillRect(col * tileSize + 5, row * tileSize + 5, 20, 20);
                        }
                    }
                }

                for(let i = 0; i < activeMeats.length; i++) {
                    let m = activeMeats.at(i);
                    ctx.fillStyle = '#FF69B4'; 
                    ctx.fillRect(m.x * tileSize + 4, m.y * tileSize + 4, 22, 22);
                }

                for(let i = 0; i < enemies.length; i++) {
                    let en = enemies.at(i);
                    ctx.fillStyle = en.color;
                    ctx.fillRect(en.x * tileSize + 4, en.y * tileSize + 4, 22, 22);
                }

            } else if (gameState === 'boss') {
                // Trampoline Base
                ctx.fillStyle = '#778899'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#111111'; 
                ctx.fillRect(60, 60, canvas.width - 120, canvas.height - 120);
                
                // The King T-Rex
                ctx.fillStyle = '#8B0000'; 
                ctx.fillRect(8 * tileSize, 6 * tileSize, tileSize * 4, tileSize * 4);
                
                // Red Light / Green Light Visuals
                if (bossState === 'sleeping') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 24px Courier New';
                    ctx.fillText('Zzz...', 8 * tileSize + 20, 6 * tileSize - 10);
                    
                    // Safe Yellow Tickle Zone
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.4)';
                    ctx.fillRect(8 * tileSize, 5 * tileSize, tileSize * 4, tileSize);
                } else {
                    ctx.fillStyle = '#FF0000';
                    ctx.font = 'bold 24px Courier New';
                    ctx.fillText('EYES OPEN!', 8 * tileSize - 10, 6 * tileSize - 10);
                    
                    // Danger Red Zone
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                    ctx.fillRect(8 * tileSize, 5 * tileSize, tileSize * 4, tileSize);
                }
                
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '18px Courier New';
                ctx.fillText('Hold SHIFT to sneak!', 200, 35);
                ctx.fillText('FREEZE when his eyes open!', 160, canvas.height - 25);
                
            } else if (gameState === 'win') {
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '40px Courier New';
                ctx.fillText('YOU WIN!', 220, 250);
                ctx.font = '20px Courier New';
                ctx.fillText('The T-Rex laughed so hard he disappeared!', 50, 300);
            }

            if (gameState !== 'win') {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x * tileSize + 4, player.y * tileSize + 4, 22, 22);
            }
        }

        function updateEngine() {
            if (isPaused) return;
            tick++;

            // Boss Arena Logic
            if (gameState === 'boss') {
                bossTimer++;
                
                if (bossState === 'sleeping' && bossTimer >= bossSleepDuration) {
                    bossState = 'awake';
                    bossTimer = 0;
                    // Random awake time between 1.5 and 2.5 seconds (6 to 10 ticks)
                    bossAwakeDuration = Math.floor(Math.random() * 5) + 6; 
                } else if (bossState === 'awake' && bossTimer >= bossAwakeDuration) {
                    bossState = 'sleeping';
                    bossTimer = 0;
                    // Random sleep time between 2.5 and 5 seconds (10 to 20 ticks)
                    bossSleepDuration = Math.floor(Math.random() * 11) + 10;
                }
                drawGame();
                return;
            }

            // Maze Logic
            if (gameState === 'maze') {
                let possibleDirs = new Array(
                    {x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}
                );

                for(let i = 0; i < enemies.length; i++) {
                    let en = enemies.at(i);
                    if (en.type === 'Stegosaurus' && tick % 2 !== 0) continue;
                    
                    let isDistracted = false;
                    let targetMeat = null;

                    if (en.type === 'Raptor' && activeMeats.length > 0) {
                        targetMeat = activeMeats.at(0);
                        isDistracted = true;
                        
                        let dx = 0; let dy = 0;
                        if (en.x < targetMeat.x) dx = 1; else if (en.x > targetMeat.x) dx = -1;
                        if (en.y < targetMeat.y) dy = 1; else if (en.y > targetMeat.y) dy = -1;
                        
                        if (dx !== 0 && maze.at(en.y).at(en.x + dx) !== 1) {
                            en.dirX = dx; en.dirY = 0;
                        } else if (dy !== 0 && maze.at(en.y + dy).at(en.x) !== 1) {
                            en.dirX = 0; en.dirY = dy;
                        }
                    }
                    
                    let nextX = en.x + en.dirX;
                    let nextY = en.y + en.dirY;
                    
                    if (nextY >= 0 && nextY < 20 && nextX >= 0 && nextX < 20) {
                        let nextTile = maze.at(nextY).at(nextX);
                        if (nextTile !== 1 && nextTile !== 4) { 
                            en.x = nextX;
                            en.y = nextY;
                        } else {
                            let validDirs = new Array();
                            for(let d=0; d<4; d++) {
                                let pd = possibleDirs.at(d);
                                let checkY = en.y + pd.y;
                                let checkX = en.x + pd.x;
                                if (checkY >= 0 && checkY < 20 && checkX >= 0 && checkX < 20) {
                                    let checkTile = maze.at(checkY).at(checkX);
                                    if (checkTile !== 1 && checkTile !== 4) {
                                        validDirs.push(pd);
                                    }
                                }
                            }
                            if (validDirs.length > 0) {
                                let rDir = validDirs.at(Math.floor(Math.random() * validDirs.length));
                                en.dirX = rDir.x;
                                en.dirY = rDir.y;
                            } else {
                                en.dirX *= -1;
                                en.dirY *= -1;
                            }
                        }
                    } else {
                        en.dirX *= -1;
                        en.dirY *= -1;
                    }

                    if (isDistracted && en.x === targetMeat.x && en.y === targetMeat.y) {
                        activeMeats.splice(0, 1);
                    }
                    
                    if (en.x === player.x && en.y === player.y) {
                        alert("ROAR! Caught by a " + en.type + "!");
                        player.x = 1; player.y = 1; 
                    }
                }
                drawGame();
            }
        }

        window.addEventListener('keydown', function(e) {
            if (gameState === 'start' || gameState === 'win') return;
            
            if (e.key === 'Escape') {
                togglePause();
                return;
            }
            if (isPaused) return;

            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault(); 
                if (gameState === 'maze' && meatInventory > 0) {
                    meatInventory--;
                    document.getElementById('meat-count').innerText = meatInventory;
                    activeMeats.push({x: player.x, y: player.y});
                    drawGame();
                }
                return;
            }
            
            if (gameState === 'boss') {
                if (e.key === 't' || e.key === 'T') {
                    if (bossState === 'awake') {
                        alert("ROAR! You can't tickle him while his eyes are open! Run!");
                        player.x = 10; player.y = 15;
                        drawGame();
                        return;
                    }
                    if (player.y === 5 && player.x >= 8 && player.x <= 11) {
                        gameState = 'win';
                        drawGame();
                        setTimeout(() => alert("TICKLE ATTACK! He laughed so hard he disappeared!"), 100);
                    }
                    return;
                }

                let dx = 0; let dy = 0;
                if (e.key === 'ArrowUp') dy = -1;
                if (e.key === 'ArrowDown') dy = 1;
                if (e.key === 'ArrowLeft') dx = -1;
                if (e.key === 'ArrowRight') dx = 1;

                if (dx === 0 && dy === 0) return; // Ignore non-movement keys

                // Red Light Movement Check!
                if (bossState === 'awake') {
                    alert("ROAR! The King saw you move! Back to the edge of the trampoline!");
                    player.x = 10; player.y = 15;
                    drawGame();
                    return;
                }

                let newX = player.x + dx; 
                let newY = player.y + dy;

                if (newX !== player.x || newY !== player.y) {
                    if (!e.shiftKey) {
                        alert("ROAR! You stomped too loudly! Hold SHIFT to sneak!");
                        player.x = 10; player.y = 15; 
                    } else {
                        if (newX >= 2 && newX <= 17 && newY >= 2 && newY <= 17) {
                            if (newX >= 8 && newX <= 11 && newY >= 6 && newY <= 9) {
                                alert("ROAR! You bumped into the sleeping King!");
                                player.x = 10; player.y = 15;
                            } else {
                                player.x = newX; player.y = newY;
                            }
                        }
                    }
                }
                drawGame();
                return;
            }

            if (gameState === 'maze') {
                let dx = 0; let dy = 0;
                if (e.key === 'ArrowUp') dy = -1;
                if (e.key === 'ArrowDown') dy = 1;
                if (e.key === 'ArrowLeft') dx = -1;
                if (e.key === 'ArrowRight') dx = 1;

                if (dx === 0 && dy === 0) return; 

                let newX = player.x + dx; 
                let newY = player.y + dy;

                if (newY >= 0 && newY < 20 && newX >= 0 && newX < 20) {
                    let currentTile = maze.at(newY).at(newX);
                    
                    if (currentTile !== 1) {
                        player.x = newX; player.y = newY;
                        
                        if (currentTile === 2) {
                            let boostX = player.x + dx;
                            let boostY = player.y + dy;
                            if (boostY >= 0 && boostY < 20 && boostX >= 0 && boostX < 20) {
                                let boostTile = maze.at(boostY).at(boostX);
                                if (boostTile !== 1) { 
                                    player.x = boostX; 
                                    player.y = boostY;
                                    currentTile = boostTile; 
                                }
                            }
                        }
                        
                        if (currentTile === 4) {
                            alert("Oh no! You stepped in bubbling lava!");
                            player.x = 1; player.y = 1;
                        }

                        if (currentTile === 5) {
                            meatInventory++;
                            document.getElementById('meat-count').innerText = meatInventory;
                            maze.at(player.y).splice(player.x, 1, 0); 
                            currentTile = 0;
                        }

                        if (currentTile === 3) {
                            let rescuedPerson = inventorNames.at(inventorsRescued);
                            backpack.push(rescuedPerson);
                            document.getElementById('backpack').innerText = backpack.join(", ");
                            
                            maze.at(player.y).splice(player.x, 1, 0); 
                            inventorsRescued++;
                            
                            if (inventorsRescued === 5) {
                                setTimeout(() => {
                                    alert("Teleporting to the Trampoline Boss Arena!");
                                    gameState = 'boss';
                                    player.x = 10; player.y = 15;
                                    bossState = 'sleeping'; // Reset boss state
                                    bossTimer = 0;
                                    drawGame();
                                }, 100);
                            }
                        }
                        
                        for(let i = 0; i < enemies.length; i++) {
                            let en = enemies.at(i);
                            if (player.x === en.x && player.y === en.y) {
                                alert("ROAR! You walked into a " + en.type + "!");
                                player.x = 1; player.y = 1;
                            }
                        }
                        
                        drawGame();
                    }
                }
            }
        });
    </script>
</body>
</html>
